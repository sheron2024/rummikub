<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rummikub</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:#07070f;font-family:'Heebo',Arial,sans-serif;user-select:none;color:white;touch-action:manipulation;}

/* ══ MENU ══ */
#screen-menu{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 20%,#1a2a5a 0%,#07070f 80%);
  display:flex;align-items:center;justify-content:center;
  overflow-y:auto;padding:12px;
}
#menu-box{
  width:100%;max-width:420px;
  padding:24px 18px;
  background:rgba(8,12,35,0.95);
  border:1px solid rgba(80,130,255,0.3);
  border-radius:20px;
  text-align:center;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;
  background:linear-gradient(135deg,#ff6b35,#ff9900,#ffcc00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:9px;color:rgba(150,180,255,0.5);letter-spacing:5px;margin-bottom:4px;}
.hello{font-size:15px;color:#88aaff;margin-bottom:12px;}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.mlbl{font-size:10px;color:#7799ee;letter-spacing:1px;font-weight:700;min-width:80px;text-align:right;}
.mopts{display:flex;gap:5px;flex:1;}
.mopt{flex:1;padding:11px 4px;border-radius:22px;border:2px solid rgba(80,130,255,0.3);
  background:rgba(15,25,70,0.5);color:rgba(180,210,255,0.65);font-size:12px;
  cursor:pointer;font-family:'Heebo',Arial,sans-serif;font-weight:700;min-height:46px;}
.mopt:active{opacity:.7;}
.mopt.act{background:linear-gradient(135deg,rgba(50,85,210,0.9),rgba(35,60,180,0.9));border-color:#5588ff;color:white;}
#name-inp{width:100%;padding:11px 14px;border-radius:22px;border:2px solid rgba(80,130,255,0.3);
  background:rgba(15,25,70,0.5);color:white;font-size:16px;font-family:'Heebo',Arial,sans-serif;
  text-align:center;outline:none;margin-bottom:14px;}
#name-inp:focus{border-color:#5588ff;}
#btn-play{width:60%;padding:15px;border-radius:28px;
  background:linear-gradient(135deg,#1a4dcc,#3377ff);
  border:3px solid rgba(100,170,255,0.6);color:white;
  font-size:28px;font-weight:900;font-family:'Bebas Neue',sans-serif;
  letter-spacing:4px;cursor:pointer;margin-bottom:12px;min-height:58px;display:block;margin-left:auto;margin-right:auto;}
#btn-play:active{opacity:.8;}
.menu-btm{display:flex;gap:8px;justify-content:center;}
.mbtm{padding:11px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Heebo',Arial,sans-serif;min-height:46px;border:none;}
.mbtm-b{background:rgba(20,45,100,0.8);border:1px solid rgba(70,130,220,0.5)!important;color:rgba(160,200,255,0.9);}
.mbtm-r{background:rgba(80,20,20,0.8);border:1px solid rgba(180,70,70,0.5)!important;color:rgba(255,190,170,0.9);}

/* ══ GAME SCREEN ══ */
#screen-game{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 20%,#1a2a5a 0%,#07070f 80%);
  display:none;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* Top bar */
#gtop{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;
  background:rgba(0,0,15,0.9);
  border-bottom:1px solid rgba(80,130,255,0.2);
  flex-shrink:0;
}
.g-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;
  background:linear-gradient(135deg,#ff6b35,#ffcc00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
#g-status{font-size:11px;color:#88aaff;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-right{display:flex;align-items:center;gap:6px;}
#g-pool{font-size:10px;color:rgba(255,255,255,0.4);white-space:nowrap;}
#btn-sound{width:34px;height:34px;border-radius:50%;background:rgba(80,130,255,0.15);
  border:1px solid rgba(80,130,255,0.3);color:white;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#btn-sound:active{opacity:.7;}
#btn-sound.muted{background:rgba(150,50,50,0.3);border-color:rgba(200,80,80,0.5);}
#g-timer{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#88aaff;min-width:40px;text-align:center;}
#g-timer.urg{color:#ff4444;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Players strip — horizontal scrollable row */
#players-strip{
  display:flex;gap:5px;
  padding:5px 8px;
  background:rgba(0,0,20,0.7);
  border-bottom:1px solid rgba(80,130,255,0.15);
  overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
#players-strip::-webkit-scrollbar{display:none;}
.pchip{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:20px;
  background:rgba(10,20,60,0.7);
  border:2px solid rgba(60,100,200,0.2);
  white-space:nowrap;flex-shrink:0;
  transition:border-color .2s;
}
.pchip.active{border-color:#5588ff;background:rgba(20,50,150,0.7);}
.pchip-face{font-size:18px;line-height:1;}
.pchip-name{font-size:11px;color:rgba(200,220,255,0.8);font-weight:700;}
.pchip-cnt{font-size:13px;font-weight:900;color:#7799ff;}
.pchip.active .pchip-cnt{color:#f0c040;}
.pchip-badge{font-size:9px;color:#55ee88;}

/* Board */
#board-wrap{flex:1;padding:5px;overflow:hidden;position:relative;min-height:0;}
#board{
  width:100%;height:100%;
  background:rgba(10,30,80,0.8);
  border:2px solid rgba(70,130,255,0.35);
  border-radius:12px;
  overflow:auto;
  position:relative;
  -webkit-overflow-scrolling:touch;
}
#board::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(100,150,255,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(100,150,255,0.06) 1px,transparent 1px);
  background-size:50px 50px;}
#board-inner{
  position:relative;z-index:1;
  min-width:100%;min-height:100%;
  padding:10px 8px 20px;
  display:flex;flex-wrap:wrap;
  align-content:flex-start;
  gap:10px;direction:ltr;
}

#meld-counter{
  position:absolute;top:7px;left:50%;transform:translateX(-50%);
  background:rgba(240,192,64,0.15);border:2px solid rgba(240,192,64,0.5);
  border-radius:20px;padding:3px 14px;font-size:12px;color:#f0c040;
  display:none;z-index:5;white-space:nowrap;
}
#meld-counter.ok{background:rgba(85,238,136,0.2);border-color:#55ee88;color:#55ee88;}
#drop-hint{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(240,192,64,0.18);border:2px dashed rgba(240,192,64,0.55);
  border-radius:10px;padding:7px 18px;font-size:12px;color:#f0c040;
  pointer-events:none;display:none;white-space:nowrap;
}

/* Board sets */
.bset{
  display:flex;gap:3px;padding:6px 8px;
  background:rgba(0,8,40,0.7);
  border:2px solid rgba(80,130,255,0.25);
  border-radius:10px;align-items:flex-end;
  flex-wrap:nowrap;position:relative;cursor:pointer;
  direction:ltr;
}
.bset:active{border-color:rgba(100,160,255,0.6);}
.bset.drop-target{border-color:#f0c040 !important;box-shadow:0 0 14px rgba(240,192,64,0.4);}
.bset.invalid{border-color:#ff4444 !important;animation:fred .5s;}
@keyframes fred{0%,100%{border-color:#ff4444}50%{border-color:#ff8888}}
.bset-pts{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  background:rgba(0,10,50,0.95);border:1px solid rgba(80,130,255,0.3);
  border-radius:8px;font-size:9px;color:#7799ff;
  padding:1px 6px;white-space:nowrap;pointer-events:none;
}

/* ══ TILES ══ */
.tile{
  width:46px;height:62px;
  border-radius:7px;flex-shrink:0;
  background:linear-gradient(160deg,#f5f0e0,#ece3c8 60%,#d5c8a8);
  box-shadow:0 4px 0 #b8a880,0 5px 10px rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;font-family:'Bebas Neue',sans-serif;
  cursor:pointer;position:relative;
  border:1px solid rgba(210,195,160,0.7);
  letter-spacing:-1px;
  transition:transform .12s,box-shadow .12s;
}
.tile::before{content:'';position:absolute;inset:2px 2px 5px;border-radius:5px;
  background:linear-gradient(160deg,rgba(255,255,255,0.6),transparent 55%);pointer-events:none;}
.tile.r{color:#bb1111;}.tile.b{color:#0d2fbb;}.tile.o{color:#cc6000;}.tile.k{color:#111;}
.tile.j{background:linear-gradient(135deg,#180050,#5500aa,#8800dd);color:#f0c040;
  border-color:#7733ee;box-shadow:0 4px 0 #33007a,0 5px 14px rgba(100,0,255,0.4);}
.tile:active:not(.no-h){transform:translateY(-5px);}
.tile.sel{transform:translateY(-12px) scale(1.08);box-shadow:0 13px 0 #f0c040,0 16px 22px rgba(0,0,0,0.55);border-color:#f0c040;}
.tile.bsel{transform:translateY(-8px) scale(1.06);box-shadow:0 10px 0 #44ff88,0 12px 16px rgba(0,0,0,0.5);border-color:#44ff88;}
/* board tile — smaller for board */
.tile.bt{width:38px;height:52px;font-size:19px;}
/* rack tile — full size */
.tile.rt{width:44px;height:60px;font-size:23px;}

/* Instruction bar */
#instr{
  background:rgba(0,8,45,0.9);
  border-top:1px solid rgba(80,130,255,0.15);
  padding:4px 10px;font-size:11px;color:#aabbff;
  text-align:center;flex-shrink:0;
}

/* Rack */
#rack-area{
  background:rgba(0,0,20,0.9);
  border-top:2px solid rgba(70,120,255,0.35);
  padding:6px 6px 8px;
  flex-shrink:0;
}
#rack-row{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  justify-content:flex-start;
  align-items:flex-end;
  direction:ltr;
}

/* Action bar — 3+3 grid */
#act-bar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  padding:4px 6px 6px;
  background:rgba(0,0,12,0.95);
  border-top:1px solid rgba(80,130,255,0.12);
  flex-shrink:0;
}
.abtn{
  padding:10px 4px;border-radius:9px;
  font-size:12px;font-weight:700;
  cursor:pointer;border:2px solid transparent;
  font-family:'Heebo',Arial,sans-serif;
  min-height:46px;touch-action:manipulation;
  line-height:1.2;
}
.abtn:disabled{opacity:.28;cursor:not-allowed;}
.abtn:active:not(:disabled){opacity:.7;transform:scale(0.96);}
.a-gray{background:rgba(25,30,80,.65);border-color:rgba(80,100,200,.4);color:rgba(180,210,255,.8);}
.a-red{background:rgba(130,20,20,.8);border-color:#dd4444;color:white;}
.a-green{background:rgba(15,90,20,.85);border-color:#44cc44;color:white;}
.a-gold{background:rgba(60,45,10,.7);border-color:rgba(200,160,30,.5);color:#f0c040;}
.a-quit{background:rgba(120,25,25,.6);border-color:rgba(200,60,60,.45);color:#ffaaaa;}

/* MSG overlay */
#msg-box{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(4,8,35,0.97);border:2px solid #5588ff;
  border-radius:14px;padding:14px 22px;font-size:14px;color:white;
  text-align:center;z-index:60;display:none;min-width:180px;
  box-shadow:0 0 30px rgba(50,110,255,0.45);
}

/* ══ QUIT OVERLAY ══ */
#screen-quit{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,10,0.93);z-index:150;
  align-items:center;justify-content:center;
}
.quit-box{
  background:linear-gradient(160deg,#090f28,#152050);
  border:2px solid rgba(80,130,255,0.4);
  border-radius:20px;padding:24px 28px;
  text-align:center;width:min(280px,88vw);
}
.quit-title{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#f0c040;margin-bottom:16px;}
.quit-btn{
  width:100%;margin-bottom:10px;padding:14px;
  border-radius:10px;color:white;font-size:15px;font-weight:900;
  border:none;cursor:pointer;font-family:'Heebo',Arial,sans-serif;min-height:50px;
}
.quit-btn:active{opacity:.8;}

/* ══ END SCREEN ══ */
#screen-end{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,10,0.93);z-index:100;
}
#end-box{
  background:linear-gradient(160deg,#090f28,#152050);
  border:2px solid rgba(80,130,255,0.4);
  border-radius:20px;padding:24px 28px;
  text-align:center;width:min(300px,90vw);
}
#end-title{font-family:'Bebas Neue',sans-serif;font-size:42px;color:#f0c040;margin-bottom:12px;}
.erow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(80,130,255,0.13);font-size:13px;color:rgba(190,215,255,.85);}
#btn-again{margin-top:14px;width:100%;padding:14px;border-radius:10px;
  background:linear-gradient(135deg,#1a44cc,#3377ff);color:white;
  font-size:16px;font-weight:900;border:none;cursor:pointer;
  font-family:'Heebo',Arial,sans-serif;min-height:52px;}
#btn-again:active{opacity:.8;}
</style>
</head>
<body>

<!-- ══ MENU ══ -->
<div id="screen-menu">
  <div id="menu-box">
    <div class="logo">Rummikub</div>
    <div class="logo-sub">BRINGS PEOPLE TOGETHER</div>
    <div class="hello" id="hello-lbl">Hello!</div>
    <input id="name-inp" type="text" placeholder="Your name / שמך" value="Sheron" oninput="updateHello()">
    <div class="mrow">
      <div class="mlbl">DIFFICULTY:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('diff','easy',this)">EASY</button>
        <button class="mopt act" onclick="setO('diff','med',this)">MED</button>
        <button class="mopt" onclick="setO('diff','hard',this)">HARD</button>
      </div>
    </div>
    <div class="mrow">
      <div class="mlbl">PLAYERS:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('players',2,this)">2</button>
        <button class="mopt" onclick="setO('players',3,this)">3</button>
        <button class="mopt act" onclick="setO('players',4,this)">4</button>
      </div>
    </div>
    <div class="mrow">
      <div class="mlbl">TIME:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('time',0,this)">NONE</button>
        <button class="mopt" onclick="setO('time',60,this)">1 MIN</button>
        <button class="mopt act" onclick="setO('time',120,this)">2 MIN</button>
      </div>
    </div>
    <button id="btn-play" onclick="startGame()">PLAY</button>
    <div class="menu-btm">
      <button class="mbtm mbtm-b" onclick="toggleLang()">🌐 עברית / English</button>
      <button class="mbtm mbtm-r" onclick="showTut()">📖 Rules</button>
    </div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="screen-game">

  <!-- Top bar -->
  <div id="gtop">
    <div class="g-logo">Rummikub</div>
    <div id="g-status">Your turn!</div>
    <div class="top-right">
      <div id="g-pool">🀱0</div>
      <button id="btn-sound" onclick="toggleSound()">🔊</button>
      <div id="g-timer">--</div>
    </div>
  </div>

  <!-- Players strip -->
  <div id="players-strip"></div>

  <!-- Board -->
  <div id="board-wrap">
    <div id="board" onclick="clickEmptyBoard(event)">
      <div id="board-inner"></div>
      <div id="meld-counter">0 / 30 pts</div>
      <div id="drop-hint">▶ Tap here — new set</div>
      <div id="msg-box"></div>
    </div>
  </div>

  <!-- Instruction -->
  <div id="instr"></div>

  <!-- Rack -->
  <div id="rack-area">
    <div id="rack-row"></div>
  </div>

  <!-- Action bar -->
  <div id="act-bar">
    <button class="abtn a-quit" onclick="showQuit()">☰ Menu</button>
    <button class="abtn a-gold" id="btn-sort" onclick="sortRack()">⇅ Sort</button>
    <button class="abtn a-gray" id="btn-undo" onclick="doUndo()">↩ Undo</button>
    <button class="abtn a-gray" id="btn-undoall" onclick="doUndoAll()">↩↩ All</button>
    <button class="abtn a-red" id="btn-get" onclick="drawTile()">🀱 Draw</button>
    <button class="abtn a-green" id="btn-end" onclick="endTurn()">✓ End</button>
  </div>

</div>

<!-- ══ QUIT ══ -->
<div id="screen-quit">
  <div class="quit-box">
    <div class="quit-title">MENU</div>
    <button class="quit-btn" onclick="resumeGame()" style="background:linear-gradient(135deg,#0f6611,#22aa22);">▶ המשך / Continue</button>
    <button class="quit-btn" onclick="location.reload()" style="background:linear-gradient(135deg,#991111,#cc2222);">🔄 משחק חדש / New Game</button>
  </div>
</div>

<!-- ══ END ══ -->
<div id="screen-end">
  <div id="end-box">
    <div id="end-title">🏆</div>
    <div id="end-scores"></div>
    <button id="btn-again" onclick="location.reload()">🔄 Play Again</button>
  </div>
</div>

<script>
/* ══ SOUND ══ */
let soundOn=true;
function toggleSound(){
  soundOn=!soundOn;
  const b=document.getElementById('btn-sound');
  b.textContent=soundOn?'🔊':'🔇';
  b.className=soundOn?'':'muted';
  if(!soundOn&&typeof speechSynthesis!=='undefined')speechSynthesis.cancel();
}
function speak(txt){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';
    o.frequency.value=txt.includes('win')||txt.includes('Win')||txt.includes('Rum')?880:txt.includes('Invalid')||txt.includes('up')?220:660;
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.4);
    setTimeout(()=>ctx.close(),600);
  }catch(e){}
  try{
    if(typeof speechSynthesis!=='undefined'){
      const u=new SpeechSynthesisUtterance(txt);u.lang='en-US';u.rate=0.95;
      const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'));
      if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);
    }
  }catch(e){}
}
if(typeof speechSynthesis!=='undefined'&&speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

/* ══ LANGUAGE ══ */
let lang='en';
const TX={
  en:{yourTurn:'Your turn!',compTurn:'Turn: ',
    invalid:'Invalid set!',timeUp:"Time's up! Reverting...",drew:'Drew a tile',
    wins:' wins!',initial:'✓ Out',pts:'pts',
    instrNone:'Tap tiles from rack, or tap a board tile to select',
    instrSel:'Selected — tap empty board (new set) or a set (add to it)',
    boardBad:'Fix invalid sets first!',hello:'Hello',
    meldNeed:'First meld needs 30+ pts. Now: '},
  he:{yourTurn:'התור שלך!',compTurn:'תור: ',
    invalid:'סט לא חוקי!',timeUp:'הזמן נגמר! הכל חוזר...',drew:'שלפת אבן',
    wins:' ניצח!',initial:'✓ יצא',pts:'נק',
    instrNone:'בחרי קלפים מהיד, או לחצי על קלף בלוח',
    instrSel:'נבחרו — לחצי על אזור ריק (סט חדש) או סט קיים (הוסיפי)',
    boardBad:'יש סטים לא חוקיים!',hello:'שלום',
    meldNeed:'יציאה ראשונה: צריך 30+ נקודות. כרגע: '}
};
function T(k){return TX[lang][k]||k;}
function toggleLang(){
  lang=lang==='en'?'he':'en';
  document.body.style.direction=lang==='he'?'rtl':'ltr';
  updateHello();
}
function updateHello(){
  const n=document.getElementById('name-inp').value||'...';
  document.getElementById('hello-lbl').textContent=T('hello')+' '+n+'!';
}
function showQuit(){stopTimer();document.getElementById('screen-quit').style.display='flex';}
function resumeGame(){document.getElementById('screen-quit').style.display='none';if(!gameOver)startTimer();}

/* ══ SETTINGS ══ */
const OPT={diff:'med',players:4,time:120};
function setO(k,v,btn){
  OPT[k]=v;
  btn.closest('.mopts').querySelectorAll('.mopt').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
}

/* ══ CONSTANTS ══ */
const COLORS=['red','blue','orange','black'];
const AI_CHARS=[{n:'Betty',f:'👩'},{n:'Vanessa',f:'👩🏿'},{n:'Bill',f:'👴'}];

/* ══ VALIDATION ══ */
function isValidSet(t){if(!t||t.length<3)return false;return isValidRun(t)||isValidGroup(t);}
function isValidRun(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  if(nj.length===0)return tiles.length>=3;
  const col=nj[0].color;
  if(!nj.every(t=>t.color===col))return false;
  const nums=nj.map(t=>t.num).sort((a,b)=>a-b);
  for(let i=1;i<nums.length;i++)if(nums[i]===nums[i-1])return false;
  if(nums[nums.length-1]-nums[0]>tiles.length-1)return false;
  if(nums[0]<1||nums[nums.length-1]>13)return false;
  return tiles.length>=3&&tiles.length<=13;
}
function isValidGroup(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  if(nj.length===0)return tiles.length>=3&&tiles.length<=4;
  const num=nj[0].num;
  if(!nj.every(t=>t.num===num))return false;
  const cols=nj.map(t=>t.color);
  if(new Set(cols).size!==cols.length)return false;
  return tiles.length>=3&&tiles.length<=4;
}
function setPoints(tiles){return tiles.reduce((s,t)=>s+(t.isJoker?30:t.num),0);}
function sortSet(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  const jk=tiles.filter(t=>t.isJoker);
  if(isValidGroup(tiles))return [...nj.sort((a,b)=>COLORS.indexOf(a.color)-COLORS.indexOf(b.color)),...jk];
  if(jk.length===0)return nj.sort((a,b)=>a.num-b.num);
  const sorted=nj.sort((a,b)=>a.num-b.num);
  if(!sorted.length)return [...jk];
  const result=[];let jp=false;
  for(let i=0;i<sorted.length;i++){
    if(i===0){result.push(sorted[i]);}
    else{
      if(sorted[i].num-sorted[i-1].num===2&&!jp){result.push(jk[0]);jp=true;}
      result.push(sorted[i]);
    }
  }
  if(!jp){if(sorted[0].num>1)result.unshift(jk[0]);else result.push(jk[0]);}
  return result;
}

/* ══ STATE ══ */
let pool=[],board=[],players=[],current=0;
let timerInt=null,timeLeft=0,gameOver=false;
let selRack=[],selBoard=[];
let turnSnap=null,lastSnap=null;
let turnMeldPts=0,turnMoved=false;

function cloneBoard(b){return b.map(s=>s.map(t=>({...t})));}
function cloneHand(h){return h.map(t=>({...t}));}
function saveSnap(){
  lastSnap={board:cloneBoard(board),hand:cloneHand(players[0].hand)};
  if(!turnSnap)turnSnap={board:cloneBoard(board),hand:cloneHand(players[0].hand)};
}
function restoreSnap(s){board=cloneBoard(s.board);players[0].hand=cloneHand(s.hand);}

function buildPool(){
  pool=[];let id=0;
  for(let c=0;c<2;c++)for(const col of COLORS)for(let n=1;n<=13;n++)
    pool.push({id:id++,color:col,num:n,isJoker:false});
  pool.push({id:id++,color:'j',num:0,isJoker:true});
  pool.push({id:id++,color:'j',num:0,isJoker:true});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
}

/* ══ START ══ */
function startGame(){
  const name=document.getElementById('name-inp').value.trim()||'Player';
  timeLeft=OPT.time;buildPool();board=[];players=[];
  selRack=[];selBoard=[];turnSnap=null;lastSnap=null;
  turnMeldPts=0;turnMoved=false;gameOver=false;
  players.push({name,face:'😊',isHuman:true,hand:[],hasInit:false});
  for(let i=0;i<OPT.players-1;i++){
    const a=AI_CHARS[i];
    players.push({name:a.n,face:a.f,isHuman:false,hand:[],hasInit:false});
  }
  players.forEach(p=>{for(let i=0;i<14;i++)if(pool.length)p.hand.push(pool.pop());});
  current=0;
  document.getElementById('screen-menu').style.display='none';
  document.getElementById('screen-game').style.display='flex';
  renderAll();startTimer();
  setTimeout(()=>speak(T('yourTurn')),500);
  showMsg(T('yourTurn'),1300);
}

/* ══ RENDER ══ */
function renderAll(){
  renderPlayersStrip();
  renderBoard();
  renderRack();
  updateBtns();
  updateInstr();
  updateMeldCounter();
  document.getElementById('g-pool').textContent='🀱'+pool.length;
  const p=players[current];
  document.getElementById('g-status').textContent=
    p.isHuman?T('yourTurn'):T('compTurn')+p.name;
}

function renderPlayersStrip(){
  const strip=document.getElementById('players-strip');
  strip.innerHTML='';
  players.forEach((p,i)=>{
    const chip=document.createElement('div');
    chip.className='pchip'+(i===current?' active':'');
    chip.innerHTML=
      `<span class="pchip-face">${p.face}</span>`+
      `<span class="pchip-name">${p.name}</span>`+
      `<span class="pchip-cnt">${p.hand.length}🀱</span>`+
      (p.hasInit?`<span class="pchip-badge">${T('initial')}</span>`:'');
    strip.appendChild(chip);
  });
}

function renderBoard(){
  const inner=document.getElementById('board-inner');
  inner.innerHTML='';
  const hasSel=selRack.length>0||selBoard.length>0;
  document.getElementById('drop-hint').style.display=hasSel?'block':'none';
  if(board.length===0){
    const ph=document.createElement('div');
    ph.style.cssText='color:rgba(100,150,255,0.2);font-size:13px;padding:20px;width:100%;text-align:center;';
    ph.textContent=lang==='he'?'— הלוח ריק — בחרי קלפים ולחצי כאן —':'— Select tiles then tap here —';
    inner.appendChild(ph);return;
  }
  board.forEach((set,si)=>{
    const valid=isValidSet(set);
    const div=document.createElement('div');
    div.className='bset'+(!valid?' invalid':'')+(hasSel?' drop-target':'');
    div.onclick=(e)=>{e.stopPropagation();clickBoardSet(si);};
    set.forEach((tile,ti)=>{
      const isBSel=selBoard.some(s=>s.si===si&&s.ti===ti);
      const el=makeTileEl(tile,'bt');
      if(isBSel)el.classList.add('bsel');
      el.onclick=(e)=>{e.stopPropagation();clickBoardTile(si,ti);};
      div.appendChild(el);
    });
    const pts=document.createElement('div');pts.className='bset-pts';
    pts.textContent=setPoints(set)+' '+T('pts')+(valid?'':' ⚠');
    div.appendChild(pts);
    inner.appendChild(div);
  });
}

function renderRack(){
  const row=document.getElementById('rack-row');
  row.innerHTML='';
  const hand=players[0].hand;
  if(!hand||hand.length===0){
    row.innerHTML='<div style="color:rgba(255,255,255,0.2);font-size:13px;padding:10px;">—</div>';
    return;
  }
  hand.forEach((tile,i)=>{
    const el=makeTileEl(tile,'rt');
    if(selRack.includes(i))el.classList.add('sel');
    el.onclick=()=>toggleRackSel(i);
    row.appendChild(el);
  });
}

function makeTileEl(tile,cls=''){
  const el=document.createElement('div');
  el.className='tile'+(cls?' '+cls:'');
  if(tile.isJoker){el.classList.add('j');el.textContent='★';}
  else{
    const cc={red:'r',blue:'b',orange:'o',black:'k'}[tile.color]||'k';
    el.classList.add(cc);el.textContent=tile.num;
  }
  return el;
}

function updateMeldCounter(){
  const el=document.getElementById('meld-counter');
  if(!players[0]||players[0].hasInit||!players[current].isHuman){el.style.display='none';return;}
  if(turnMeldPts>0){
    el.style.display='block';
    el.textContent=turnMeldPts+' / 30 pts';
    el.className='#meld-counter'+(turnMeldPts>=30?' ok':'');
    el.id='meld-counter';
    el.style.display='block';
    if(turnMeldPts>=30)el.classList.add('ok');else el.classList.remove('ok');
  }else{el.style.display='none';}
}

function updateInstr(){
  const el=document.getElementById('instr');
  if(!players[current].isHuman){el.textContent='';return;}
  const hasSel=selRack.length>0||selBoard.length>0;
  el.textContent=hasSel?T('instrSel'):T('instrNone');
}

function updateBtns(){
  const h=players[current].isHuman;
  document.getElementById('btn-sort').disabled=!h;
  document.getElementById('btn-undo').disabled=!h||!lastSnap;
  document.getElementById('btn-undoall').disabled=!h||!turnSnap;
  document.getElementById('btn-get').disabled=!h;
  document.getElementById('btn-end').disabled=!h;
}

/* ══ SELECTION ══ */
function toggleRackSel(i){
  if(!players[current].isHuman)return;
  const pos=selRack.indexOf(i);
  if(pos>=0)selRack.splice(pos,1);else selRack.push(i);
  renderRack();renderBoard();updateInstr();
}
function clickBoardTile(si,ti){
  if(!players[current].isHuman)return;
  const pos=selBoard.findIndex(s=>s.si===si&&s.ti===ti);
  if(pos>=0)selBoard.splice(pos,1);
  else selBoard.push({si,ti,tile:board[si][ti]});
  renderBoard();updateInstr();
}

/* ══ PLACE ══ */
function clickEmptyBoard(e){
  if(!players[current].isHuman)return;
  if(e.target.closest('.bset'))return;
  if(selRack.length===0&&selBoard.length===0)return;
  const hand=players[0].hand;
  const rackTiles=selRack.map(i=>hand[i]);
  const boardTiles=selBoard.map(s=>s.tile);
  const all=[...rackTiles,...boardTiles];
  if(all.length<3){showMsg(lang==='he'?'צריך 3+ קלפים':'Need 3+ tiles',1400);return;}
  if(!isValidSet(all)){showMsg(T('invalid'),1500);speak('Invalid!');return;}
  const human=players[0];
  const ptsFromHand=setPoints(rackTiles);
  if(!human.hasInit){
    const tot=turnMeldPts+ptsFromHand;
    if(tot<30)showMsg(T('meldNeed')+tot+'/30)',2000);
  }
  saveSnap();
  [...selRack].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));
  [...selBoard].sort((a,b)=>b.si-a.si||(b.ti-a.ti)).forEach(({si,ti})=>{
    board[si].splice(ti,1);if(board[si].length===0)board.splice(si,1);
  });
  board.push(sortSet([...all]));
  if(!human.hasInit)turnMeldPts+=ptsFromHand;
  turnMoved=true;selRack=[];selBoard=[];
  speak('Nice!');renderAll();
}

function clickBoardSet(si){
  if(!players[current].isHuman)return;
  if(selRack.length===0&&selBoard.length===0)return;
  const hand=players[0].hand;
  const rackTiles=selRack.map(i=>hand[i]);
  const boardTilesOther=selBoard.filter(s=>s.si!==si);
  const boardTilesThis=selBoard.filter(s=>s.si===si);
  const baseSet=board[si].filter((_,i)=>!boardTilesThis.some(s=>s.ti===i));
  const newSet=[...baseSet,...rackTiles,...boardTilesOther.map(s=>s.tile)];
  if(!isValidSet(newSet)){showMsg(T('invalid'),1500);speak('Invalid!');return;}
  const human=players[0];
  const ptsFromHand=setPoints(rackTiles);
  if(!human.hasInit){
    const tot=turnMeldPts+ptsFromHand;
    if(tot<30)showMsg(T('meldNeed')+tot+'/30)',2000);
  }
  saveSnap();
  [...selRack].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));
  [...selBoard].sort((a,b)=>b.si-a.si||(b.ti-a.ti)).forEach(({si:srcSi,ti:srcTi})=>{
    if(srcSi!==si){board[srcSi].splice(srcTi,1);if(board[srcSi].length===0)board.splice(srcSi,1);}
  });
  board[si]=sortSet(newSet);
  if(!human.hasInit)turnMeldPts+=ptsFromHand;
  turnMoved=true;selRack=[];selBoard=[];
  speak('Nice!');renderAll();
}

/* ══ DRAW ══ */
function drawTile(){
  if(!players[current].isHuman)return;
  if(pool.length===0){showMsg('Pool empty!',1200);nextTurn();return;}
  saveSnap();
  players[0].hand.push(pool.pop());
  selRack=[];selBoard=[];turnMoved=true;
  showMsg(T('drew'),800);renderAll();nextTurn();
}

/* ══ END TURN ══ */
function endTurn(){
  if(!players[current].isHuman)return;
  if(!turnMoved){
    if(pool.length>0){players[0].hand.push(pool.pop());showMsg(T('drew'),1000);}
    setTimeout(()=>{renderAll();nextTurn();},1100);return;
  }
  if(board.some(s=>!isValidSet(s))){
    showMsg(T('boardBad'),2000);speak('Invalid!');return;
  }
  const human=players[0];
  if(!human.hasInit&&turnMeldPts<30){
    showMsg(T('meldNeed')+turnMeldPts+'/30)',2500);
    if(turnSnap)restoreSnap(turnSnap);
    turnMeldPts=0;turnMoved=false;lastSnap=null;turnSnap=null;
    selRack=[];selBoard=[];renderAll();return;
  }
  if(!human.hasInit&&turnMeldPts>=30)human.hasInit=true;
  if(human.hand.length===0){endGame(0);return;}
  if(checkWin())return;
  nextTurn();
}

/* ══ UNDO ══ */
function doUndo(){
  if(!lastSnap||!players[current].isHuman)return;
  restoreSnap(lastSnap);lastSnap=null;
  selRack=[];selBoard=[];renderAll();
}
function doUndoAll(){
  if(!turnSnap||!players[current].isHuman)return;
  restoreSnap(turnSnap);lastSnap=null;turnSnap=null;
  turnMeldPts=0;turnMoved=false;selRack=[];selBoard=[];renderAll();
}
function sortRack(){
  players[0].hand.sort((a,b)=>{
    if(a.isJoker)return 1;if(b.isJoker)return -1;
    if(a.color!==b.color)return COLORS.indexOf(a.color)-COLORS.indexOf(b.color);
    return a.num-b.num;
  });
  selRack=[];renderRack();
}

/* ══ TURN FLOW ══ */
function nextTurn(){
  if(gameOver)return;
  selRack=[];selBoard=[];lastSnap=null;turnSnap=null;
  turnMeldPts=0;turnMoved=false;
  stopTimer();
  current=(current+1)%players.length;
  timeLeft=OPT.time||0;
  renderAll();
  if(pool.length===0){
    const canPlay=players.some(p=>{
      if(p.isHuman)return true;
      return findSets(p.hand).some(s=>p.hasInit||setPoints(s)>=30);
    });
    if(!canPlay){
      let m=99,w=0;
      players.forEach((p,i)=>{if(p.hand.length<m){m=p.hand.length;w=i;}});
      endGame(w);return;
    }
  }
  startTimer();
  if(!players[current].isHuman)
    setTimeout(()=>aiTurn(),OPT.diff==='easy'?2000:OPT.diff==='med'?1200:700);
  else{speak(T('yourTurn'));showMsg(T('yourTurn'),1200);}
}

function checkWin(){
  for(let i=0;i<players.length;i++)
    if(players[i].hand.length===0){endGame(i);return true;}
  return false;
}

function endGame(wi){
  if(players[wi].hand.length>0&&players[wi].isHuman)return;
  gameOver=true;stopTimer();speak('Rummikub!');
  players.forEach(p=>{p.score=p.hand.reduce((s,t)=>s+(t.isJoker?30:t.num),0);});
  const w=players[wi];
  document.getElementById('end-title').textContent=w.face+' '+w.name+T('wins');
  const sc=document.getElementById('end-scores');sc.innerHTML='';
  players.forEach((p,i)=>{
    const r=document.createElement('div');r.className='erow';
    r.innerHTML=`<span>${p.face} ${p.name}</span><span style="color:${i===wi?'#f0c040':'rgba(190,215,255,.65)'}">${p.score} pts — ${p.hand.length} 🀱</span>`;
    sc.appendChild(r);
  });
  document.getElementById('screen-end').style.display='flex';
}

/* ══ TIMER ══ */
function startTimer(){
  if(!OPT.time){document.getElementById('g-timer').textContent='--';return;}
  stopTimer();
  const el=document.getElementById('g-timer');
  el.classList.remove('urg');el.textContent=fmt(timeLeft);
  timerInt=setInterval(()=>{
    timeLeft--;el.textContent=fmt(timeLeft);
    if(timeLeft<=10)el.classList.add('urg');
    if(timeLeft<=0){
      stopTimer();
      if(players[current].isHuman){
        if(turnSnap)restoreSnap(turnSnap);
        if(pool.length>0)players[0].hand.push(pool.pop());
        selRack=[];selBoard=[];lastSnap=null;turnSnap=null;
        turnMeldPts=0;turnMoved=false;
        speak(T('timeUp'));showMsg(T('timeUp'),2000);
        setTimeout(()=>{renderAll();if(!gameOver)nextTurn();},2100);
      }else nextTurn();
    }
  },1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

/* ══ AI ══ */
function aiTurn(){
  if(gameOver)return;
  const p=players[current];
  const snap={board:cloneBoard(board),hand:cloneHand(p.hand)};
  let moved=doAiMove(p,OPT.diff);
  if(!board.every(s=>isValidSet(s))){
    board=cloneBoard(snap.board);p.hand=cloneHand(snap.hand);
    if(pool.length>0)p.hand.push(pool.pop());
  }else if(!moved){if(pool.length>0)p.hand.push(pool.pop());}
  renderAll();
  if(checkWin())return;
  if(!gameOver)nextTurn();
}

function doAiMove(p,diff){
  let moved=false;
  let keepTrying=true;
  while(keepTrying&&p.hand.length>0){
    keepTrying=false;
    const sets=findSets(p.hand).filter(s=>p.hasInit||setPoints(s)>=30);
    if(!sets.length)break;
    sets.sort((a,b)=>diff==='easy'?Math.random()-.5:b.length-a.length||setPoints(b)-setPoints(a));
    const best=sets[0];
    best.forEach(t=>{const i=p.hand.indexOf(t);if(i>=0)p.hand.splice(i,1);});
    board.push(sortSet([...best]));p.hasInit=true;moved=true;
    keepTrying=diff!=='easy';
  }
  if(p.hasInit&&board.length>0){
    let added=true;
    while(added&&p.hand.length>0){
      added=false;
      for(let ti=0;ti<p.hand.length;ti++){
        const tile=p.hand[ti];
        for(let si=0;si<board.length;si++){
          const ns=sortSet([...board[si],tile]);
          if(isValidSet(ns)){board[si]=ns;p.hand.splice(ti,1);moved=true;added=true;break;}
        }
        if(added)break;
      }
    }
  }
  if(p.hasInit&&(diff==='med'||diff==='hard')&&p.hand.length>0){
    for(let si=0;si<board.length&&p.hand.length>0;si++){
      const set=[...board[si]];
      for(let ti=0;ti<set.length;ti++){
        const taken=set[ti];
        const remaining=set.filter((_,i)=>i!==ti);
        if(remaining.length<3||!isValidSet(remaining))continue;
        for(let h1=0;h1<p.hand.length;h1++){
          for(let h2=h1+1;h2<p.hand.length;h2++){
            const ns=sortSet([taken,p.hand[h1],p.hand[h2]]);
            if(isValidSet(ns)){
              board[si]=sortSet(remaining);
              p.hand.splice(h2,1);p.hand.splice(h1,1);
              board.push(ns);moved=true;
              let more=true;
              while(more&&p.hand.length>0){
                more=false;
                for(let t2=0;t2<p.hand.length;t2++){
                  for(let s2=0;s2<board.length;s2++){
                    const ns2=sortSet([...board[s2],p.hand[t2]]);
                    if(isValidSet(ns2)){board[s2]=ns2;p.hand.splice(t2,1);more=true;break;}
                  }if(more)break;
                }
              }
              break;
            }
          }if(moved&&diff==='med')break;
        }if(moved&&diff==='med')break;
      }
    }
  }
  if(diff==='hard'&&p.hasInit){
    for(let si=0;si<board.length;si++){
      const set=board[si];if(set.length<6)continue;
      for(let sp=3;sp<=set.length-3;sp++){
        const p1=set.slice(0,sp),p2=set.slice(sp);
        if(isValidSet(p1)&&isValidSet(p2)){
          board[si]=p1;board.push(p2);moved=true;
          let more=true;
          while(more&&p.hand.length>0){
            more=false;
            for(let t2=0;t2<p.hand.length;t2++){
              for(let s2=0;s2<board.length;s2++){
                const ns=sortSet([...board[s2],p.hand[t2]]);
                if(isValidSet(ns)){board[s2]=ns;p.hand.splice(t2,1);more=true;break;}
              }if(more)break;
            }
          }
          break;
        }
      }
    }
  }
  return moved;
}

function findSets(hand){
  const results=[];const seen=new Set();
  function addSet(s){
    if(!isValidSet(s))return;
    const key=s.map(t=>t.id).sort((a,b)=>a-b).join(',');
    if(!seen.has(key)){seen.add(key);results.push(s);}
  }
  const byCol={};
  COLORS.forEach(c=>{byCol[c]=hand.filter(t=>!t.isJoker&&t.color===c).sort((a,b)=>a.num-b.num);});
  const jk=hand.filter(t=>t.isJoker);
  COLORS.forEach(col=>{
    const tiles=byCol[col];
    for(let i=0;i<tiles.length;i++){
      let run=[tiles[i]];
      for(let j=i+1;j<tiles.length;j++){
        if(tiles[j].num===run[run.length-1].num+1){run.push(tiles[j]);if(run.length>=3)addSet([...run]);}
        else if(tiles[j].num>run[run.length-1].num+1)break;
      }
      if(jk.length>0){
        let jRun=[tiles[i]];let ju=false;
        for(let j=i+1;j<tiles.length;j++){
          const gap=tiles[j].num-jRun[jRun.length-1].num;
          if(gap===1){jRun.push(tiles[j]);if(jRun.length>=3)addSet([...jRun]);}
          else if(gap===2&&!ju){ju=true;jRun.push(jk[0]);jRun.push(tiles[j]);if(jRun.length>=3)addSet([...jRun]);}
          else break;
        }
        if(tiles[i].num>1)addSet([jk[0],tiles[i],tiles[i+1]].filter(Boolean));
        if(i+1<tiles.length)addSet([tiles[i],tiles[i+1],jk[0]]);
        if(i+2<tiles.length)addSet([tiles[i],tiles[i+1],tiles[i+2]]);
      }
    }
  });
  for(let n=1;n<=13;n++){
    const same=hand.filter(t=>!t.isJoker&&t.num===n);
    const unique=[];const usedColors=new Set();
    same.forEach(t=>{if(!usedColors.has(t.color)){usedColors.add(t.color);unique.push(t);}});
    if(unique.length>=3){
      for(let a=0;a<unique.length-2;a++)
        for(let b=a+1;b<unique.length-1;b++)
          for(let c=b+1;c<unique.length;c++)addSet([unique[a],unique[b],unique[c]]);
      if(unique.length>=4)
        for(let a=0;a<unique.length-3;a++)
          for(let b=a+1;b<unique.length-2;b++)
            for(let c=b+1;c<unique.length-1;c++)
              for(let d=c+1;d<unique.length;d++)addSet([unique[a],unique[b],unique[c],unique[d]]);
    }
    if(unique.length>=2&&jk.length>0){
      for(let a=0;a<unique.length-1;a++)
        for(let b=a+1;b<unique.length;b++)addSet([unique[a],unique[b],jk[0]]);
    }
  }
  return results;
}
