<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rummikub</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:radial-gradient(ellipse at 50% 20%,#1a2a5a 0%,#07070f 80%);font-family:'Heebo',Arial,sans-serif;overflow:hidden;height:100vh;direction:rtl;user-select:none;color:white;}

/* MENU */
#screen-menu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
#menu-box{text-align:center;width:min(500px,95vw);padding:30px 32px;background:rgba(8,12,35,0.92);border:1px solid rgba(80,130,255,0.3);border-radius:20px;box-shadow:0 0 50px rgba(40,80,255,0.2);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:58px;letter-spacing:3px;background:linear-gradient(135deg,#ff6b35,#ff9900,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,140,0,0.4));}
.logo-sub{font-size:10px;color:rgba(150,180,255,0.5);letter-spacing:5px;margin-bottom:6px;}
.hello{font-size:18px;color:#88aaff;margin-bottom:18px;}
.mrow{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.mlbl{font-size:11px;color:#7799ee;letter-spacing:2px;font-weight:700;min-width:115px;text-align:right;}
.mopts{display:flex;gap:7px;flex:1;}
.mopt{flex:1;padding:9px 5px;border-radius:22px;border:2px solid rgba(80,130,255,0.3);background:rgba(15,25,70,0.5);color:rgba(180,210,255,0.65);font-size:12px;cursor:pointer;font-family:'Heebo',Arial,sans-serif;font-weight:700;transition:all .18s;}
.mopt:hover{border-color:rgba(100,160,255,0.6);}
.mopt.act{background:linear-gradient(135deg,rgba(50,85,210,0.85),rgba(35,60,180,0.85));border-color:#5588ff;color:white;box-shadow:0 0 10px rgba(70,110,255,0.4);}
#name-inp{width:100%;padding:9px 14px;border-radius:22px;border:2px solid rgba(80,130,255,0.3);background:rgba(15,25,70,0.5);color:white;font-size:14px;font-family:'Heebo',Arial,sans-serif;text-align:center;outline:none;margin-bottom:18px;}
#name-inp:focus{border-color:#5588ff;}
#btn-play{width:55%;padding:14px;border-radius:28px;background:linear-gradient(135deg,#1a4dcc,#3377ff);border:3px solid rgba(100,170,255,0.6);color:white;font-size:26px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:4px;cursor:pointer;box-shadow:0 0 30px rgba(50,110,255,0.5);transition:all .2s;margin-bottom:12px;}
#btn-play:hover{transform:scale(1.04);}
.menu-btm{display:flex;gap:8px;justify-content:center;}
.mbtm{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Heebo',Arial,sans-serif;}
.mbtm-b{background:rgba(20,45,100,0.7);border:1px solid rgba(70,130,220,0.4);color:rgba(160,200,255,0.8);}
.mbtm-r{background:rgba(80,20,20,0.7);border:1px solid rgba(180,70,70,0.4);color:rgba(255,190,170,0.8);}

/* GAME */
#screen-game{position:absolute;inset:0;display:none;flex-direction:column;}
#gtop{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:rgba(0,0,12,0.8);border-bottom:1px solid rgba(80,130,255,0.2);flex-shrink:0;}
.g-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;background:linear-gradient(135deg,#ff6b35,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#g-status{font-size:12px;color:#88aaff;max-width:180px;text-align:center;}
#g-timer{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#88aaff;min-width:50px;text-align:center;}
#g-timer.urg{color:#ff3333;animation:bl .5s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

#game-main{flex:1;display:flex;overflow:hidden;}
.sidebar{width:96px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:6px;background:rgba(0,0,18,0.55);border:1px solid rgba(80,130,255,0.1);}
.acard{width:86px;padding:6px 4px;text-align:center;background:rgba(8,16,55,0.7);border:2px solid rgba(60,110,220,0.22);border-radius:10px;transition:all .25s;}
.acard.active{border-color:#5588ff;box-shadow:0 0 12px rgba(70,110,255,0.45);background:rgba(18,38,100,0.8);}
.aface{font-size:30px;line-height:1;margin-bottom:2px;}
.aname{font-size:10px;color:rgba(190,215,255,0.85);font-weight:700;margin-bottom:2px;}
.acount{font-size:12px;color:#7799ff;font-weight:900;background:rgba(0,0,28,0.6);border-radius:14px;padding:2px 7px;display:inline-block;}
.acount.me{color:#f0c040;}
.abadge{font-size:9px;color:#55ee88;margin-top:2px;}

#board-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* BOARD */
#board-wrap{flex:1;padding:6px;overflow:hidden;position:relative;}
#board{width:100%;height:100%;background:linear-gradient(135deg,rgba(15,50,110,0.75),rgba(8,25,75,0.85));border:2px solid rgba(70,130,255,0.4);border-radius:12px;overflow:auto;position:relative;box-shadow:0 0 28px rgba(35,75,200,0.3),inset 0 0 35px rgba(0,0,40,0.5);cursor:pointer;}
#board::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(100,150,255,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(100,150,255,0.07) 1px,transparent 1px);background-size:48px 48px;}
#board-inner{position:relative;z-index:1;min-width:100%;min-height:100%;padding:10px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px;}

/* DROP ZONE hint */
#drop-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(240,192,64,0.2);border:2px dashed rgba(240,192,64,0.6);border-radius:10px;padding:8px 20px;font-size:12px;color:#f0c040;pointer-events:none;display:none;}

/* INSTRUCTION */
#instr{background:rgba(0,10,50,0.88);border-top:1px solid rgba(80,130,255,0.2);padding:5px 12px;font-size:12px;color:#aabbff;text-align:center;flex-shrink:0;min-height:26px;}

/* Sets on board */
.bset{display:flex;gap:2px;padding:5px 8px;background:rgba(0,8,35,0.65);border:2px solid rgba(80,130,255,0.22);border-radius:8px;align-items:flex-end;flex-wrap:nowrap;position:relative;cursor:pointer;transition:border-color .2s;}
.bset:hover{border-color:rgba(100,160,255,0.5);}
.bset.drop-target{border-color:#f0c040 !important;box-shadow:0 0 16px rgba(240,192,64,0.5);background:rgba(60,40,0,0.4);}
.bset.invalid{border-color:#ff4444 !important;animation:fred .5s;}
@keyframes fred{0%,100%{border-color:#ff4444}50%{border-color:#ff8888}}
.bset-pts{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:rgba(0,15,60,0.9);border:1px solid rgba(80,130,255,0.3);border-radius:8px;font-size:8px;color:#7799ff;padding:1px 6px;white-space:nowrap;pointer-events:none;}

/* TILES */
.tile{width:40px;height:54px;border-radius:6px;flex-shrink:0;background:linear-gradient(160deg,#f5f0e0 0%,#ece3c8 60%,#d5c8a8 100%);box-shadow:0 3px 0 #b8a880,0 4px 8px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:'Bebas Neue',sans-serif;cursor:pointer;transition:all .13s;position:relative;border:1px solid rgba(210,195,160,0.7);letter-spacing:-1px;}
.tile::before{content:'';position:absolute;inset:2px 2px 4px;border-radius:4px;background:linear-gradient(160deg,rgba(255,255,255,0.65),transparent 55%);pointer-events:none;}
.tile.r{color:#bb1111;}.tile.b{color:#0d2fbb;}.tile.o{color:#cc6000;}.tile.k{color:#111;}
.tile.j{background:linear-gradient(135deg,#180050,#5500aa,#8800dd);color:#f0c040;border-color:#7733ee;box-shadow:0 3px 0 #33007a,0 4px 12px rgba(100,0,255,0.4);}
.tile:hover:not(.no-h){transform:translateY(-4px);box-shadow:0 7px 0 #b8a880,0 9px 14px rgba(0,0,0,0.5);}
.tile.sel{transform:translateY(-10px) scale(1.07);box-shadow:0 12px 0 #f0c040,0 14px 20px rgba(0,0,0,0.6);border-color:#f0c040;}
.tile.bsel{transform:translateY(-7px) scale(1.05);box-shadow:0 9px 0 #44ff88,0 11px 16px rgba(0,0,0,0.5);border-color:#44ff88;}
.tile.bt{width:37px;height:49px;font-size:17px;}
.tile.rt{width:39px;height:52px;font-size:18px;}

/* RACK */
#rack-area{background:rgba(0,0,18,0.85);border-top:2px solid rgba(70,120,255,0.3);padding:6px 10px;flex-shrink:0;}
#rack-row{display:flex;gap:3px;overflow-x:auto;padding-bottom:3px;min-height:58px;align-items:flex-end;}
#rack-row::-webkit-scrollbar{height:3px;}
#rack-row::-webkit-scrollbar-thumb{background:rgba(100,150,255,0.3);border-radius:2px;}

/* ACTION BAR — minimal */
#act-bar{display:flex;gap:6px;padding:6px 8px;background:rgba(0,0,12,0.92);border-top:1px solid rgba(80,130,255,0.15);flex-shrink:0;}
.abtn{flex:1;min-width:60px;padding:11px 5px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;font-family:'Heebo',Arial,sans-serif;transition:all .18s;min-height:44px;}
.abtn:disabled{opacity:.3;cursor:not-allowed;}
.a-gray{background:rgba(25,30,80,.6);border-color:rgba(80,100,200,.35);color:rgba(180,210,255,.75);}
.a-red{background:linear-gradient(135deg,#991111,#cc2222);border-color:#ff5555;color:white;}
.a-green{background:linear-gradient(135deg,#0f6611,#22aa22);border-color:#55ee55;color:white;}
.a-gold{background:rgba(60,45,10,.6);border-color:rgba(180,145,30,.4);color:#f0c040;}

/* MSG */
#msg-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,8,35,0.96);border:2px solid #5588ff;border-radius:13px;padding:13px 22px;font-size:14px;color:white;text-align:center;z-index:60;display:none;min-width:190px;box-shadow:0 0 28px rgba(50,110,255,0.4);}

/* END */
#screen-end{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,10,0.92);z-index:100;}
#end-box{background:linear-gradient(160deg,#090f28,#152050);border:2px solid rgba(80,130,255,0.4);border-radius:20px;padding:28px 36px;text-align:center;min-width:280px;max-width:90vw;}
#end-title{font-family:'Bebas Neue',sans-serif;font-size:46px;color:#f0c040;margin-bottom:10px;}
.erow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(80,130,255,0.13);font-size:13px;color:rgba(190,215,255,.8);}
#btn-again{margin-top:14px;width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#1a44cc,#3377ff);color:white;font-size:16px;font-weight:900;border:none;cursor:pointer;font-family:'Heebo',Arial,sans-serif;}
</style>
</head>
<body>

<!-- MENU -->
<div id="screen-menu">
  <div id="menu-box">
    <div class="logo">Rummikub</div>
    <div class="logo-sub">BRINGS PEOPLE TOGETHER</div>
    <div class="hello" id="hello-lbl">Hello!</div>
    <input id="name-inp" type="text" placeholder="Your name / שמך" value="Sheron" oninput="updateHello()">
    <div class="mrow">
      <div class="mlbl">DIFFICULTY:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('diff','easy',this)">EASY</button>
        <button class="mopt" onclick="setO('diff','med',this)">MEDIUM</button>
        <button class="mopt act" onclick="setO('diff','hard',this)">HARD</button>
      </div>
    </div>
    <div class="mrow">
      <div class="mlbl">PLAYERS:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('players',2,this)">2</button>
        <button class="mopt" onclick="setO('players',3,this)">3</button>
        <button class="mopt act" onclick="setO('players',4,this)">4</button>
      </div>
    </div>
    <div class="mrow">
      <div class="mlbl">TIME LIMIT:</div>
      <div class="mopts">
        <button class="mopt" onclick="setO('time',0,this)">NONE</button>
        <button class="mopt" onclick="setO('time',60,this)">1 MIN</button>
        <button class="mopt act" onclick="setO('time',120,this)">2 MIN</button>
      </div>
    </div>
    <button id="btn-play" onclick="startGame()">PLAY</button>
    <div class="menu-btm">
      <button class="mbtm mbtm-b" onclick="toggleLang()">🌐 עברית / English</button>
      <button class="mbtm mbtm-r" onclick="showTut()">📖 How to Play</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="screen-game">
  <div id="gtop">
    <div class="g-logo">Rummikub</div>
    <div id="g-status"></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="g-pool" style="font-size:11px;color:rgba(255,255,255,0.4);"></div>
      <div id="g-timer">--</div>
    </div>
  </div>

  <div id="game-main">
    <!-- Left: Human -->
    <div class="sidebar" id="sidebar-l">
      <div class="acard" id="card-0">
        <div class="aface" id="face-0">😊</div>
        <div class="aname" id="pname-0"></div>
        <div class="acount me" id="cnt-0">14</div>
        <div class="abadge" id="bdg-0"></div>
      </div>
    </div>

    <!-- Center -->
    <div id="board-area">
      <div id="board-wrap">
        <div id="board" onclick="clickEmptyBoard(event)">
          <div id="board-inner"></div>
          <div id="drop-hint">▶ לחצי כאן להנחת סט חדש</div>
          <div id="msg-box"></div>
        </div>
      </div>
      <div id="instr"></div>
      <div id="rack-area"><div id="rack-row"></div></div>
      <div id="act-bar">
        <button class="abtn a-gold" id="btn-sort" onclick="sortRack()">⇅ Sort</button>
        <button class="abtn a-gray" id="btn-undo" onclick="doUndo()">↩ Undo</button>
        <button class="abtn a-gray" id="btn-undoall" onclick="doUndoAll()">↩↩ Undo All</button>
        <button class="abtn a-red" id="btn-get" onclick="drawTile()">🀱 Draw</button>
        <button class="abtn a-green" id="btn-end" onclick="endTurn()">✓ End Turn</button>
      </div>
    </div>

    <!-- Right: AI -->
    <div class="sidebar" id="sidebar-r"></div>
  </div>
</div>

<!-- END -->
<div id="screen-end">
  <div id="end-box">
    <div id="end-title">🏆</div>
    <div id="end-scores"></div>
    <button id="btn-again" onclick="location.reload()">🔄 Play Again</button>
  </div>
</div>

<script>
// ══ VOICE ══
function speak(txt){
  try{
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='en-US';u.rate=0.95;u.pitch=1.1;u.volume=1;
    const voices=speechSynthesis.getVoices();
    const v=voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang.startsWith('en'))||voices[0];
    if(v)u.voice=v;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){}
}
if(typeof speechSynthesis!=='undefined'&&speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

// ══ LANGUAGE ══
let lang='en';
const TX={
  en:{
    yourTurn:'Your turn!',compTurn:'Turn: ',
    noInit:'First meld needs 30+ points!',
    invalid:'Invalid set!',timeUp:'Time\'s up!',drew:'Drew a tile',
    wins:' wins!',again:'🔄 Play Again',initial:'✓ Melded',pts:'pts',
    instrNone:'Select tiles from your rack, or tap a tile on the board',
    instrRack:'Tiles selected — tap board area for new set, or tap existing set to add',
    instrMix:'Tap an existing set on board or empty area to place',
    boardBad:'Fix invalid sets!',noAction:'No tiles selected',
    hello:'Hello',timeoutMsg:'Time\'s up! Changes reverted. Drawing a tile...'
  },
  he:{
    yourTurn:'התור שלך!',compTurn:'תור: ',
    noInit:'יציאה ראשונה: 30+ נקודות!',
    invalid:'סט לא חוקי!',timeUp:'הזמן נגמר!',drew:'שלפת אבן',
    wins:' ניצח!',again:'🔄 משחק חדש',initial:'✓ יצא',pts:'נק',
    instrNone:'בחרי קלפים מהיד, או לחצי על קלף בלוח',
    instrRack:'קלפים נבחרו — לחצי על אזור ריק בלוח (סט חדש) או על סט קיים',
    instrMix:'לחצי על סט קיים בלוח או על אזור ריק',
    boardBad:'יש סטים לא חוקיים!',noAction:'לא נבחרו קלפים',
    hello:'שלום',timeoutMsg:'הזמן נגמר! הכל חוזר. שולף קלף...'
  }
};
function T(k){return TX[lang][k]||k;}
function toggleLang(){lang=lang==='en'?'he':'en';document.body.style.direction=lang==='he'?'rtl':'ltr';updateHello();}
function updateHello(){const n=document.getElementById('name-inp').value||'...';document.getElementById('hello-lbl').textContent=T('hello')+' '+n+'!';}

// ══ SETTINGS ══
const OPT={diff:'hard',players:4,time:120};
function setO(k,v,btn){OPT[k]=v;btn.closest('.mopts').querySelectorAll('.mopt').forEach(b=>b.classList.remove('act'));btn.classList.add('act');}

// ══ CONSTANTS ══
const COLORS=['red','blue','orange','black'];
const AI_CHARS=[{n:'Betty',f:'👩'},{n:'Vanessa',f:'👩🏿'},{n:'Bill',f:'👴'}];

// ══ GAME STATE ══
let pool=[],board=[],players=[],current=0;
let timerInt=null,timeLeft=0,gameOver=false;

// Selection: mix of rack indices + board tile refs
// selRack = [idx in hand]
// selBoard = [{si, ti}] — board tiles selected (e.g. joker to move)
let selRack=[];
let selBoard=[]; // board tiles selected to include in next placement

// Snapshot
let turnSnap=null; // start of turn — restored on timeout
let lastSnap=null; // last action — restored on undo
let turnMoved=false; // did human do anything this turn?

// ══ POOL ══
function buildPool(){
  pool=[];let id=0;
  for(let c=0;c<2;c++)for(const col of COLORS)for(let n=1;n<=13;n++)pool.push({id:id++,color:col,num:n,isJoker:false});
  pool.push({id:id++,color:'j',num:0,isJoker:true});
  pool.push({id:id++,color:'j',num:0,isJoker:true});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
}

function cloneBoard(b){return b.map(s=>s.map(t=>({...t})));}
function cloneHand(h){return h.map(t=>({...t}));}
function saveSnap(){
  lastSnap={board:cloneBoard(board),hand:cloneHand(players[0].hand)};
  if(!turnSnap)turnSnap={board:cloneBoard(board),hand:cloneHand(players[0].hand)};
}
function restoreSnap(s){board=cloneBoard(s.board);players[0].hand=cloneHand(s.hand);}

// ══ START ══
function startGame(){
  const name=document.getElementById('name-inp').value.trim()||'Player';
  timeLeft=OPT.time;buildPool();board=[];players=[];
  selRack=[];selBoard=[];turnSnap=null;lastSnap=null;turnMoved=false;gameOver=false;

  players.push({name,face:'😊',isHuman:true,hand:[],hasInit:false});
  for(let i=0;i<OPT.players-1;i++){const a=AI_CHARS[i];players.push({name:a.n,face:a.f,isHuman:false,hand:[],hasInit:false});}
  players.forEach(p=>{for(let i=0;i<14;i++)if(pool.length)p.hand.push(pool.pop());});
  current=0;
  document.getElementById('screen-menu').style.display='none';
  document.getElementById('screen-game').style.display='flex';
  renderAll();startTimer();
  setTimeout(()=>speak(T('yourTurn')),400);
  showMsg(T('yourTurn'),1200);
}

// ══ RENDER ══
function renderAll(){
  renderSidebars();renderBoard();renderRack();updateBtns();updateInstr();
  document.getElementById('g-pool').textContent='🀱 '+pool.length;
  const p=players[current];
  document.getElementById('g-status').textContent=p.isHuman?T('yourTurn'):T('compTurn')+p.name;
}

function renderSidebars(){
  const h=players[0];
  document.getElementById('face-0').textContent=h.face;
  document.getElementById('pname-0').textContent=h.name;
  document.getElementById('cnt-0').textContent=h.hand.length;
  document.getElementById('bdg-0').textContent=h.hasInit?T('initial'):'';
  document.getElementById('card-0').className='acard'+(current===0?' active':'');
  const sr=document.getElementById('sidebar-r');sr.innerHTML='';
  for(let i=1;i<players.length;i++){
    const p=players[i];const c=document.createElement('div');
    c.className='acard'+(i===current?' active':'');
    c.innerHTML=`<div class="aface">${p.face}</div><div class="aname">${p.name}</div><div class="acount">${p.hand.length} 🀱</div><div class="abadge">${p.hasInit?T('initial'):''}</div>`;
    sr.appendChild(c);
  }
}

function renderBoard(){
  const inner=document.getElementById('board-inner');inner.innerHTML='';
  const hasAnySelected=selRack.length>0||selBoard.length>0;

  // Show drop hint when tiles selected
  document.getElementById('drop-hint').style.display=hasAnySelected?'block':'none';
  document.getElementById('drop-hint').textContent=lang==='he'?'▶ לחצי כאן לסט חדש':'▶ Click here for new set';

  if(board.length===0){
    const ph=document.createElement('div');
    ph.style.cssText='color:rgba(100,150,255,0.2);font-size:13px;padding:18px;width:100%;text-align:center;letter-spacing:2px;margin-top:20px;';
    ph.textContent=lang==='he'?'— הלוח ריק — בחרי קלפים ולחצי כאן':'— Board is empty — select tiles and click here —';
    inner.appendChild(ph);
    return;
  }

  board.forEach((set,si)=>{
    const valid=isValidSet(set);
    const div=document.createElement('div');
    div.className='bset'+((!valid&&set.length>0)?' invalid':'')+(hasAnySelected?' drop-target':'');
    div.onclick=(e)=>{e.stopPropagation();clickBoardSet(si);};

    set.forEach((tile,ti)=>{
      const isBSel=selBoard.some(s=>s.si===si&&s.ti===ti);
      const el=makeTileEl(tile,'bt');
      if(isBSel)el.classList.add('bsel');
      el.onclick=(e)=>{e.stopPropagation();clickBoardTile(si,ti);};
      div.appendChild(el);
    });

    const pts=document.createElement('div');pts.className='bset-pts';
    pts.textContent=setPoints(set)+' '+T('pts')+(valid?'':' ⚠');
    div.appendChild(pts);
    inner.appendChild(div);
  });
}

function renderRack(){
  const row=document.getElementById('rack-row');row.innerHTML='';
  const hand=players[0].hand;
  if(!hand||hand.length===0){row.innerHTML='<div style="color:rgba(255,255,255,0.25);font-size:13px;padding:8px;">—</div>';return;}
  hand.forEach((tile,i)=>{
    const el=makeTileEl(tile,'rt');
    if(selRack.includes(i))el.classList.add('sel');
    el.onclick=()=>toggleRackSel(i);
    row.appendChild(el);
  });
}

function makeTileEl(tile,cls=''){
  const el=document.createElement('div');
  el.className='tile'+(cls?' '+cls:'');
  if(tile.isJoker){el.classList.add('j');el.textContent='★';}
  else{const cc={red:'r',blue:'b',orange:'o',black:'k'}[tile.color]||'k';el.classList.add(cc);el.textContent=tile.num;}
  return el;
}

function updateInstr(){
  const el=document.getElementById('instr');
  if(!players[current].isHuman){el.textContent='';return;}
  const hasRack=selRack.length>0;
  const hasBoard=selBoard.length>0;
  if(!hasRack&&!hasBoard)el.textContent=T('instrNone');
  else if(hasRack&&!hasBoard)el.textContent=T('instrRack');
  else el.textContent=T('instrMix');
}

function updateBtns(){
  const h=players[current].isHuman;
  document.getElementById('btn-sort').disabled=!h;
  document.getElementById('btn-undo').disabled=!h||!lastSnap;
  document.getElementById('btn-undoall').disabled=!h||!turnSnap;
  document.getElementById('btn-get').disabled=!h;
  document.getElementById('btn-end').disabled=!h;
}

// ══ TILE SELECTION ══

function toggleRackSel(i){
  if(!players[current].isHuman)return;
  const pos=selRack.indexOf(i);
  if(pos>=0)selRack.splice(pos,1);else selRack.push(i);
  renderRack();renderBoard();updateInstr();
}

// Click a tile ON THE BOARD — select it (e.g. joker to include in new set)
function clickBoardTile(si,ti){
  if(!players[current].isHuman)return;
  const pos=selBoard.findIndex(s=>s.si===si&&s.ti===ti);
  if(pos>=0){
    // Deselect — tile goes back to its set visually
    selBoard.splice(pos,1);
  } else {
    // Select this board tile — mark it
    selBoard.push({si,ti,tile:board[si][ti]});
  }
  renderBoard();renderRack();updateInstr();
}

// Click a SET on the board — place selected tiles INTO this set
function clickBoardSet(si){
  if(!players[current].isHuman)return;
  const hasRack=selRack.length>0;
  const hasBoard=selBoard.length>0;
  if(!hasRack&&!hasBoard){updateInstr();return;}

  const hand=players[0].hand;
  const rackTiles=selRack.map(i=>hand[i]);

  // Board tiles selected from OTHER sets
  const boardTilesFromOther=selBoard.filter(s=>s.si!==si);
  // Board tiles selected FROM THIS set (deselect them from the target)
  const boardTilesFromThis=selBoard.filter(s=>s.si===si);

  // Build proposed new set
  const currentSet=[...board[si]];
  // Remove any selected tiles from this set
  const tiIndicesFromThis=boardTilesFromThis.map(s=>s.ti).sort((a,b)=>b-a);
  const removedFromThis=[];
  tiIndicesFromThis.forEach(ti=>{removedFromThis.push(currentSet[ti]);});
  const baseSet=currentSet.filter((_,i)=>!tiIndicesFromThis.includes(i));

  const newSet=[...baseSet,...rackTiles,...boardTilesFromOther.map(s=>s.tile)];

  if(!isValidSet(newSet)){
    showMsg(T('invalid'),1500);speak('Invalid!');
    highlightSet(si);return;
  }

  const human=players[0];
  const pointsFromHand=setPoints(rackTiles);
  if(!human.hasInit&&pointsFromHand<30&&board.length===0){
    showMsg(T('noInit'),2000);return;
  }

  saveSnap();

  // Remove rack tiles
  [...selRack].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));

  // Remove board tiles from their source sets
  // Process in reverse order of set index to preserve indices
  const boardSources=[...selBoard].sort((a,b)=>b.si-a.si||(b.ti-a.ti));
  boardSources.forEach(({si:srcSi,ti:srcTi})=>{
    if(srcSi!==si){
      board[srcSi].splice(srcTi,1);
      if(board[srcSi].length===0)board.splice(srcSi,1);
    }
  });

  // Recalculate si after removals
  // Find which index our target set is now at
  const targetSetRef=board[si]; // may have shifted if we removed sets before it
  // Just update our target set
  board[si]=sortSet(newSet);
  // Actually: we need to be careful. Let's use a ref approach:
  // Rebuild board properly
  if(!human.hasInit)human.hasInit=true;
  turnMoved=true;
  selRack=[];selBoard=[];
  speak('Nice!');
  renderAll(); // win checked at end turn
}

// Click empty area of board — place selected as NEW SET
function clickEmptyBoard(e){
  if(!players[current].isHuman)return;
  // Only if clicked on #board-inner or #board directly (not a set or tile)
  if(e.target.closest('.bset'))return;

  const hasRack=selRack.length>0;
  const hasBoard=selBoard.length>0;
  if(!hasRack&&!hasBoard){updateInstr();return;}

  const hand=players[0].hand;
  const rackTiles=selRack.map(i=>hand[i]);
  const boardTiles=selBoard.map(s=>s.tile);
  const allTiles=[...rackTiles,...boardTiles];

  if(allTiles.length<3){showMsg(lang==='he'?'צריך לפחות 3 קלפים':'Need at least 3 tiles',1400);return;}
  if(!isValidSet(allTiles)){showMsg(T('invalid'),1500);speak('Invalid!');return;}

  const human=players[0];
  if(!human.hasInit&&setPoints(allTiles)<30){showMsg(T('noInit'),2000);return;}

  saveSnap();

  // Remove rack tiles
  [...selRack].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));

  // Remove board tiles from their source sets (reverse order)
  const sorted=[...selBoard].sort((a,b)=>b.si-a.si||(b.ti-a.ti));
  sorted.forEach(({si,ti})=>{
    board[si].splice(ti,1);
    if(board[si].length===0)board.splice(si,1);
  });

  board.push(sortSet([...allTiles]));
  if(!human.hasInit)human.hasInit=true;
  turnMoved=true;
  selRack=[];selBoard=[];
  speak('Nice!');
  renderAll(); // win checked at end turn
}

function highlightSet(si){
  const sets=document.querySelectorAll('.bset');
  if(sets[si]){sets[si].classList.add('invalid');setTimeout(()=>{if(sets[si])sets[si].classList.remove('invalid');},800);}
}

// ══ DRAW ══
function drawTile(){
  if(!players[current].isHuman)return;
  if(pool.length===0){showMsg('Pool empty!',1200);nextTurn();return;}
  saveSnap();
  players[0].hand.push(pool.pop());
  selRack=[];selBoard=[];turnMoved=true;
  showMsg(T('drew'),800);
  renderAll();nextTurn();
}

// ══ END TURN ══
function endTurn(){
  if(!players[current].isHuman)return;
  // If nothing was done — auto draw
  if(!turnMoved){
    if(pool.length>0){players[0].hand.push(pool.pop());speak('Draw');showMsg(T('drew'),1000);}
    setTimeout(()=>{renderAll();nextTurn();},1100);
    return;
  }
  // Validate all sets
  if(!board.every(s=>isValidSet(s))){
    document.querySelectorAll('.bset').forEach((el,i)=>{
      if(board[i]&&!isValidSet(board[i])){
        el.classList.add('invalid');
        setTimeout(()=>{if(el)el.classList.remove('invalid');},1000);
      }
    });
    showMsg(T('boardBad'),2000);speak('Invalid!');return;
  }
  // Check win ONLY here at end of turn
  if(checkWin(true)) return;
  nextTurn();
}

// ══ UNDO ══
function doUndo(){
  if(!lastSnap||!players[current].isHuman)return;
  restoreSnap(lastSnap);lastSnap=null;
  selRack=[];selBoard=[];
  renderAll();
}
function doUndoAll(){
  if(!turnSnap||!players[current].isHuman)return;
  restoreSnap(turnSnap);lastSnap=null;turnSnap=null;turnMoved=false;
  selRack=[];selBoard=[];
  renderAll();
}
function sortRack(){
  players[0].hand.sort((a,b)=>{
    if(a.isJoker)return 1;if(b.isJoker)return -1;
    if(a.color!==b.color)return COLORS.indexOf(a.color)-COLORS.indexOf(b.color);
    return a.num-b.num;
  });
  selRack=[];renderRack();
}

// ══ NEXT TURN ══
function nextTurn(){
  if(gameOver)return;
  selRack=[];selBoard=[];lastSnap=null;turnSnap=null;turnMoved=false;
  stopTimer();
  current=(current+1)%players.length;
  timeLeft=OPT.time||0;
  renderAll();startTimer();
  if(!players[current].isHuman)setTimeout(aiTurn,1100);
  else{speak(T('yourTurn'));showMsg(T('yourTurn'),1200);}
}

function checkWin(fromEndTurn=false){
  // Only declare win at end of turn, not mid-turn
  if(!fromEndTurn) return false;
  for(let i=0;i<players.length;i++){
    if(players[i].hand.length===0){endGame(i);return true;}
  }
  if(pool.length===0){
    let m=99,w=0;
    players.forEach((p,i)=>{if(p.hand.length<m){m=p.hand.length;w=i;}});
    endGame(w);return true;
  }
  return false;
}

function endGame(wi){
  gameOver=true;stopTimer();
  players.forEach(p=>{p.score=p.hand.reduce((s,t)=>s+(t.isJoker?30:t.num),0);});
  speak('Rummikub!');
  const w=players[wi];
  document.getElementById('end-title').textContent=w.face+' '+w.name+T('wins');
  const sc=document.getElementById('end-scores');sc.innerHTML='';
  players.forEach((p,i)=>{
    const r=document.createElement('div');r.className='erow';
    r.innerHTML=`<span>${p.face} ${p.name}</span><span style="color:${i===wi?'#f0c040':'rgba(190,215,255,.65)'}">${p.score} pts — ${p.hand.length} 🀱</span>`;
    sc.appendChild(r);
  });
  document.getElementById('btn-again').textContent=T('again');
  document.getElementById('screen-end').style.display='flex';
}

// ══ TIMER ══
function startTimer(){
  if(!OPT.time){document.getElementById('g-timer').textContent='--';return;}
  stopTimer();
  const el=document.getElementById('g-timer');
  el.classList.remove('urg');el.textContent=fmt(timeLeft);
  timerInt=setInterval(()=>{
    timeLeft--;el.textContent=fmt(timeLeft);
    if(timeLeft<=10)el.classList.add('urg');
    if(timeLeft<=0){
      stopTimer();
      if(players[current].isHuman){
        // Restore turn start — undo all changes
        if(turnSnap)restoreSnap(turnSnap);
        if(pool.length>0)players[0].hand.push(pool.pop());
        selRack=[];selBoard=[];lastSnap=null;turnSnap=null;turnMoved=false;
        speak("Time's up!");showMsg(T('timeoutMsg'),2200);
        setTimeout(()=>{renderAll();if(!gameOver)nextTurn();},2300);
      }else nextTurn();
    }
  },1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

// ══ AI ══
function aiTurn(){
  if(gameOver)return;
  const p=players[current];
  const sets=findSets(p.hand);
  let moved=false;
  const valid=sets.filter(s=>p.hasInit||setPoints(s)>=30);
  if(valid.length>0){
    if(OPT.diff==='hard')valid.sort((a,b)=>setPoints(b)-setPoints(a));
    else if(OPT.diff==='easy')valid.sort(()=>Math.random()-.5);
    const best=valid[0];
    best.forEach(t=>{const i=p.hand.indexOf(t);if(i>=0)p.hand.splice(i,1);});
    board.push([...best]);p.hasInit=true;moved=true;
    if(OPT.diff!=='easy'){
      let more=true;
      while(more&&p.hand.length>0){
        more=false;
        const ms=findSets(p.hand).filter(s=>p.hasInit||setPoints(s)>=30);
        if(ms.length>0){const s2=ms[0];s2.forEach(t=>{const i=p.hand.indexOf(t);if(i>=0)p.hand.splice(i,1);});board.push([...s2]);more=true;}
      }
    }
  }
  if(!moved&&pool.length>0)p.hand.push(pool.pop());
  renderAll();
  if(checkWin(true))return;
  if(!gameOver)nextTurn();
}

function isValidSet(tiles){if(!tiles||tiles.length<3)return false;return isValidRun(tiles)||isValidGroup(tiles);}

function isValidRun(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  if(nj.length===0)return tiles.length>=3;
  const col=nj[0].color;
  if(!nj.every(t=>t.color===col))return false;
  const nums=nj.map(t=>t.num).sort((a,b)=>a-b);
  for(let i=1;i<nums.length;i++)if(nums[i]===nums[i-1])return false;
  const range=nums[nums.length-1]-nums[0];
  if(range>tiles.length-1)return false;
  if(nums[0]<1||nums[nums.length-1]>13)return false;
  return tiles.length>=3&&tiles.length<=13;
}

function isValidGroup(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  if(nj.length===0)return tiles.length>=3&&tiles.length<=4;
  const num=nj[0].num;
  if(!nj.every(t=>t.num===num))return false;
  const cols=nj.map(t=>t.color);
  if(new Set(cols).size!==cols.length)return false;
  return tiles.length>=3&&tiles.length<=4;
}

function setPoints(tiles){return tiles.reduce((s,t)=>s+(t.isJoker?30:t.num),0);}

function sortSet(tiles){
  const nj=tiles.filter(t=>!t.isJoker);
  const jk=tiles.filter(t=>t.isJoker);
  if(isValidGroup(tiles)){
    return [...nj.sort((a,b)=>COLORS.indexOf(a.color)-COLORS.indexOf(b.color)),...jk];
  }
  return [...nj.sort((a,b)=>a.num-b.num),...jk];
}

function findSets(hand){
  const sets=[];
  const byCol={};COLORS.forEach(c=>{byCol[c]=hand.filter(t=>!t.isJoker&&t.color===c).sort((a,b)=>a.num-b.num);});
  const jk=hand.filter(t=>t.isJoker);
  COLORS.forEach(col=>{
    const t=byCol[col];
    for(let i=0;i<t.length;i++){
      for(let j=i+2;j<t.length;j++){const s=t.slice(i,j+1);if(isValidRun(s))sets.push(s);}
      if(jk.length>0){for(let j=i+1;j<t.length;j++){const s=[...t.slice(i,j+1),jk[0]];if(isValidRun(s))sets.push(s);}}
    }
  });
  for(let n=1;n<=13;n++){
    const s=hand.filter(t=>!t.isJoker&&t.num===n);
    if(s.length>=3){for(let i=0;i<=s.length-3;i++){sets.push([s[i],s[i+1],s[i+2]]);if(s.length>i+3)sets.push([s[i],s[i+1],s[i+2],s[i+3]]);}}
    if(s.length>=2&&jk.length>0)sets.push([s[0],s[1],jk[0]]);
  }
  return sets.filter(s=>isValidSet(s));
}

function showMsg(txt,dur){const el=document.getElementById('msg-box');el.textContent=txt;el.style.display='block';setTimeout(()=>el.style.display='none',dur||2000);}

function showTut(){
  alert(lang==='he'?
    'איך משחקים:\n\n1. לחצי על קלפים ביד לבחור (יאירו זהב)\n2. לחצי על קלף ★ בלוח לבחור גם אותו\n3. לחצי על אזור ריק בלוח → סט חדש\n4. לחצי על סט קיים בלוח → מצטרף אליו\n5. לא עשית כלום? "End Turn" → שולף קלף אוטומטית\n6. יציאה ראשונה: 30+ נקודות\n7. הזמן נגמר? הכל חוזר + קלף נוסף':
    'How to Play:\n\n1. Click tiles in your rack to select (glow gold)\n2. Click a board tile (e.g. Joker ★) to select it too\n3. Click empty board area → create new set\n4. Click existing board set → tiles join it\n5. Did nothing? "End Turn" → auto-draws a tile\n6. First meld: 30+ points\n7. Time\'s up? Everything reverts + you draw a tile'
  );
}
